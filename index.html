<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TASS — Coming August 2026</title>
  <meta name="description" content="TASS is being rebuilt. Local-first software for serious work, back in August 2026.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#2E7D5E">
  <link rel="canonical" href="https://usetass.app/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #2E7D5E;
      --text: #0F0F0F;
      --muted: #6B7280;
      --bg: #FFFFFF;
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Bricolage Grotesque', 'Plus Jakarta Sans', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --text: #F4F4F5; --muted: #A1A1AA; --bg: #0C1A14; --accent: #6FC19A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font); color: var(--text); background: var(--bg); display: flex; flex-direction: column; min-height: 100%; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; max-width: 640px; width: 100%; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .kicker { font-size: 0.875rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    .kicker a { color: var(--muted); border: none; }
    h1 { font-family: var(--font-display); font-weight: 700; font-size: clamp(2.75rem, 9vw, 4.75rem); letter-spacing: -0.02em; line-height: 1.02; color: var(--accent); }
    .status { font-family: var(--font-display); font-weight: 500; font-size: clamp(1.1rem, 3.5vw, 1.5rem); margin-top: 0.75rem; color: var(--text); }
    .lede { margin-top: 1.5rem; font-size: 1.0625rem; color: var(--muted); max-width: 46ch; }
    .contact { margin-top: 2rem; font-size: 1rem; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid currentColor; }
    a:hover, a:focus { opacity: 0.75; }
    footer { max-width: 640px; width: 100%; margin: 0 auto; padding: 1.5rem; font-size: 0.8125rem; color: var(--muted); border-top: 1px solid color-mix(in srgb, var(--muted) 30%, transparent); }
  </style>
</head>
<body>
  <main>
    <p class="kicker"><a href="https://simdadllc.com">A SIM DAD product</a></p>
    <h1>TASS</h1>
    <p class="status">Coming August 2026</p>
    <p class="lede">We've taken TASS offline while we rebuild it as part of one local-first suite. Back in August.</p>
    <p class="contact"><a href="mailto:hello@simdadllc.com">hello@simdadllc.com</a></p>
  </main>
  <footer>© 2026 SIM DAD LLC · <a href="privacy.html">Privacy</a> · <a href="eula.html">EULA</a></footer>
</body>
</html>
